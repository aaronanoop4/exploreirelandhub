    <h1>Explore Ireland</h1>

        <a href="index.html">Home</a>
        <a href="destinations.html">Destinations</a>
        <a href="plan.html">Plan Trip</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="section">
    <h2>Plan Your Trip</h2>

    <div class="card" style="max-width:600px;margin:auto;text-align:left;">

        <form id="tripForm">

            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="tel" placeholder="Phone Number" required>

            <label>Destination</label>
            <select>
                <option>Dublin</option>
                <option>Galway</option>
                <option>Cork</option>
                <option>Cliffs of Moher</option>
		<option>Kerry</option>
		<option>Belfast</option>
		<option>Limerick</option>
		<option>Giant's Causeway</option>
            </select>

            <label>Travel Date</label>
            <input type="date">

            <textarea placeholder="Describe your travel plans..." rows="5"></textarea>

            <button type="submit">Submit</button>

        </form>

    </div>
</section>

    <h3>Explore Ireland</h3>
